<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Imágenes (Flexbox)</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body> 
    <header> 
        <h1> Galería de atardeceres</h1>
        <p>Imágenes creadas mediante Inteligencia artificial</p>
    </header>

    <main class="albumdefotos">

        <figure>
            <img src="atardecer1.png" alt="atardecer en una playa">
            <figcaption>Atardecer en una playa</figcaption>
        </figure>

        <figure>
        <img src="atardecer2.png" alt="atardecer en un río de montaña">
        <figcaption>Atardecer en la montaña</figcaption>
        </figure>

        <figure>
        <img src="atardecer3.png" alt="atardecer en un desierto rocoso">
        <figcaption>Atardecer desde lo alto de un desierto</figcaption>
        </figure>

        <figure>
        <img src="atardecer4.png" alt="atardecer sobre un valle">
        <figcaption>Atardecer en un valle</figcaption>
        </figure>

        <figure>
        <img src="atardecer5.png" alt="atardecer sobre un lago con los picos nevados">
        <figcaption>Atardecer sobre un lago</figcaption>
        </figure>

        <figure>
        <img src="atardecer6.png" alt="atardecer sobre un desierto con un arbol milenario en el centro">
        <figcaption>Atardecer desde un desierto</figcaption>
        </figure>

        <figure>
        <img src="atardecer7.png" alt="atardecer en una playa caribeña">
        <figcaption>Atardecer desde una playa caribeña</figcaption>
        </figure>

        <figure>
        <img src="atardecer8.png" alt="atardecer sobre una costa con un faro al fondo y un barquito">
        <figcaption>Atardecer desde una playa con un faro al fondo</figcaption>
        </figure>

    </main>

</body>
</html>
